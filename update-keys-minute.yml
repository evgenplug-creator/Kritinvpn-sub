  name: Update VPN Keys Every Minute

# Права на запись в репозиторий
permissions:
  contents: write

on:
  schedule:
    # Запускать КАЖДУЮ МИНУТУ
    - cron: '* * * * *'
  # Ручной запуск
  workflow_dispatch:

jobs:
  update-keys:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and select random keys
        run: |
          echo "📥 Скачиваю свежие ключи..."
          # Скачиваем файл с ключами
          curl -L -o all_keys.txt "https://raw.githubusercontent.com/Hidashimora/free-vpn-anti-rkn/main/configs/28.1.txt"
          
          # Проверяем, что файл скачался
          if [ ! -s all_keys.txt ]; then
            echo "❌ Ошибка: файл пустой или не скачался"
            exit 1
          fi
          
          # Удаляем пустые строки и комментарии
          grep -v '^#' all_keys.txt | grep -v '^$' > clean_keys.txt
          
          # Считаем количество ключей
          total_keys=$(wc -l < clean_keys.txt)
          echo "📊 Всего ключей в источнике: $total_keys"
          
          # Выбираем 6-7 случайных ключей
          echo "🎲 Выбираю 6-7 случайных ключей..."
          
          # Перемешиваем и берем первые 7
          shuf clean_keys.txt | head -n 7 > selected_keys.txt
          
          # Проверяем сколько выбрали
          selected_count=$(wc -l < selected_keys.txt)
          echo "✅ Выбрано $selected_count ключей"

      - name: Update sub.txt
        run: |
          echo "🔄 Обновляю sub.txt..."
          # Добавляем заголовок с датой
          echo "# KritinVPN Keys - Автообновление $(date '+%d.%m.%Y %H:%M:%S')" > sub.txt
          echo "# Всего ключей: $(wc -l < selected_keys.txt)" >> sub.txt
          echo "" >> sub.txt
          # Добавляем выбранные ключи
          cat selected_keys.txt >> sub.txt
          echo "✅ Файл sub.txt обновлен"

      - name: Check for changes
        id: check_changes
        run: |
          # Проверяем, были ли изменения в файле
          if git diff --quiet sub.txt; then
            echo "📊 Изменений нет - ключи те же"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "📊 Есть изменения - обновляем репозиторий"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          git commit -m "🔄 Автообновление $(date '+%d.%m.%Y %H:%M:%S') - $(wc -l < selected_keys.txt) ключей"
          git push
          echo "✅ Изменения отправлены в репозиторий"

      - name: Log completion
        if: always()
        run: |
          echo "✅ Workflow завершен в $(date '+%d.%m.%Y %H:%M:%S')"
